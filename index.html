<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Channel Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3799;
            --primary-light: #4a69bd;
            --accent: #f6b93b;
            --success: #78e08f;
            --danger: #eb2f06;
            --bg-light: #f8f9fa;
            --text-dark: #2c3e50;
            --border-color: #dcdde1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f2f6; color: var(--text-dark); min-height: 100vh; }
        
        .login-page-bg {
            background: linear-gradient(rgba(30, 55, 153, 0.75), rgba(12, 20, 52, 0.9)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--accent);
        }
        .login-box h2 { text-align: center; margin-bottom: 10px; color: var(--primary); font-weight: 700; }
        .login-box p { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--text-dark); }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            background: var(--bg-light);
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus, textarea:focus { border: 2px solid var(--primary-light); background: #fff; }
        
        .app-container { max-width: 1100px; margin: 30px auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .app-banner { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); padding: 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .app-banner h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        .user-panel { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; background: var(--accent); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; }
        .role-badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 12px; text-transform: uppercase; font-weight: 600; }
        .role-badge.admin { background: var(--accent); color: var(--primary); }

        .nav-bar { display: flex; background: #2c3e50; padding: 5px; overflow-x: auto; }
        .nav-bar button { background: transparent; color: #a4b0be; border: none; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border-radius: 4px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .nav-bar button:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .nav-bar button.active { background: var(--accent); color: var(--primary); }

        .main-content { padding: 40px; min-height: 400px; position: relative; }
        .hidden { display: none !important; }
        h2.section-title { font-size: 22px; color: var(--primary); margin-bottom: 25px; border-bottom: 2px solid var(--bg-light); padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 10px; }
        .box { padding: 25px; border-radius: 10px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .box h3 { font-size: 16px; font-weight: 500; opacity: 0.9; margin-bottom: 10px; }
        .box .stat { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .box p { font-size: 13px; opacity: 0.8; }

        .display-card { background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 10px; padding: 30px; margin-top: 20px; }
        .display-card h3 { color: var(--primary); font-size: 22px; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .info-cell { background: white; padding: 15px; border-radius: 6px; border-left: 4px solid var(--primary-light); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .info-cell small { color: #7f8c8d; text-transform: uppercase; font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; }
        .info-cell span { font-size: 16px; font-weight: 600; color: var(--text-dark); }

        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .channel-tag { background: #e8f0fe; color: var(--primary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid #c7d9f9; }
        .channel-tag.new { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        
        .history-tag { display: inline-block; background: #f1f2f6; color: #5d6d7e; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin: 2px; border: 1px solid #dcdde1; }
        .history-tag.new { background: #d4edda; color: #155724; border-color: #c3e6cb; }

        .checkbox-matrix-container { 
            max-height: 320px; 
            overflow-y: auto; 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            border-radius: 6px; 
            background: var(--bg-light); 
            display: block; 
            margin-bottom: 25px; 
        }
        .checkbox-item { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            padding: 10px 12px; 
            border-bottom: 1px solid #e8ecef; 
            width: 100%; 
            box-sizing: border-box;
        }
        .checkbox-item:last-child { border-bottom: none; }
        .checkbox-item:hover { background-color: rgba(30, 55, 153, 0.05); }
        .checkbox-item input { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }

        .page-overlay-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .modal-subpage-box { background: white; width: 100%; max-width: 650px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); overflow: hidden; border-top: 6px solid var(--primary); }
        .modal-header { background: var(--bg-light); padding: 20px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 30px; max-height: 400px; overflow-y: auto; }
        .modal-footer { background: var(--bg-light); padding: 15px 30px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }
        
        .swap-row-item { display: grid; grid-template-columns: 1fr auto 1.2fr; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px dashed var(--border-color); }
        .swap-row-item:last-child { border-bottom: none; }
        .swap-row-item select { margin-bottom: 0; padding: 8px; font-size: 14px; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; background: white; }
        th { background: var(--primary); color: white; padding: 14px 18px; font-size: 14px; font-weight: 600; }
        td { padding: 14px 18px; border-bottom: 1px solid var(--border-color); font-size: 15px; }
        tr:hover td { background-color: var(--bg-light); }

        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn:hover { background: var(--primary-light); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #ff4d4d; }
        .btn-small { padding: 6px 12px; font-size: 13px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-page-bg">
        <div class="login-box">
            <h2>Hotel Management</h2>
            <p>Access the Allocation Distribution Node</p>
            
            <label for="u">Username</
