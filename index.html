<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Channel Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* High-Attractive Classic Hotel Theme Colors */
        :root {
            --primary: #1e3799;
            --primary-light: #4a69bd;
            --accent: #f6b93b;
            --success: #78e08f;
            --danger: #eb2f06;
            --bg-light: #f8f9fa;
            --text-dark: #2c3e50;
            --border-color: #dcdde1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f2f6; color: var(--text-dark); min-height: 100vh; }
        
        /* Attractive Login Background Image Setup */
        .login-page-bg {
            background: linear-gradient(rgba(30, 55, 153, 0.75), rgba(12, 20, 52, 0.9)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Simplified, Fail-Proof Login Card */
        .login-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--accent);
        }
        .login-box h2 { text-align: center; margin-bottom: 10px; color: var(--primary); font-weight: 700; }
        .login-box p { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        
        /* Direct, Non-Nested Simple Form Controls */
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--text-dark); }
